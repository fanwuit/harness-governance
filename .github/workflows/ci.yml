name: CI

on:
  push:
    branches: [main, product]
    tags: ["v*"]
  pull_request:
    branches: [main, product]
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.python == '3.13' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package
        run: pip install -e ".[test]"

      - name: Run tests with coverage
        run: pytest -v --cov=harness_governance --cov-report=term-missing --cov-report=xml

      - name: Enforce coverage floor (85%)
        # CONTRIBUTING.md targets 94%; we enforce an 85% floor in CI to
        # catch regressions without blocking in-flight work.
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          line_rate = float(tree.getroot().attrib['line-rate']) * 100
          print(f'Coverage: {line_rate:.2f}%')
          if line_rate < 85.0:
              raise SystemExit(f'Coverage {line_rate:.2f}% below 85% floor')
          "

      - name: Build wheel
        run: pip install build && python -m build --wheel

      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, glob, sys
          wheels = glob.glob('dist/*.whl')
          assert wheels, 'No wheel found'
          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()
              required = [
                  'data/templates/',
                  'data/references/',
                  'data/skills/',
                  'data/role-prompts/',
              ]
              missing = [r for r in required if not any(r in n for n in names)]
              if missing:
                  print(f'MISSING in wheel: {missing}')
                  sys.exit(1)
              print(f'Wheel OK: {wheels[0]} ({len(names)} files)')
          "
        shell: bash

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
